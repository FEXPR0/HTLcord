<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>HTLcord</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Login-Bereich (wird ausgeblendet sobald eingeloggt) -->
    <div id="login-screen">
        <h1>💬 HTLcord</h1>

        <input type="text"     id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Passwort">

        <button onclick="login()">Login</button>
        <button onclick="register()">Registrieren</button>

        <p id="login-error" style="color:red"></p>
    </div>

    <!-- Chat-Bereich (erst sichtbar nach Login) -->
    <div id="chat-screen" style="display:none">

        <div id="sidebar">
            <h2>Channels</h2>
            <!-- TODO: Channels dynamisch laden -->
            <div class="channel" onclick="joinChannel('allgemein')"># allgemein</div>
            <div class="channel" onclick="joinChannel('random')"># random</div>
        </div>

        <div id="chat-area">
            <div id="messages">
                <!-- Nachrichten werden hier per JS eingefügt -->
            </div>

            <div id="input-area">
                <input type="text" id="message-input" placeholder="Nachricht schreiben...">
                <button onclick="sendMessage()">Senden</button>
            </div>
        </div>

    </div>

    <script src="/static/app.js"></script>
</body>
</html>
